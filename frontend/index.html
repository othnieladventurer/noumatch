<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://api.noumatch.com https://api-staging.noumatch.com https://*.noumatch.com wss://api.noumatch.com wss://api-staging.noumatch.com wss://*.noumatch.com http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*; media-src 'self' blob: https:; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests"
    />

    <!-- SEO -->
    <title>Site de rencontres authentiques et sincères</title>
    <meta
      name="description"
      content="NouMatch est un espace de rencontres moderne qui favorise des connexions authentiques dans une communauté équilibrée et respectueuse."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://noumatch.com/" />
    <meta name="author" content="NouMatch" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NouMatch – Rencontres authentiques" />
    <meta
      property="og:description"
      content="NouMatch est un espace de rencontres moderne qui favorise des connexions authentiques dans une communauté équilibrée et respectueuse."
    />
    <meta property="og:image" content="https://noumatch.com/main_img.png" />
    <meta property="og:url" content="https://noumatch.com" />
    <meta property="og:site_name" content="NouMatch" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NouMatch – Rencontres authentiques" />
    <meta
      name="twitter:description"
      content="NouMatch est une application de rencontres moderne qui favorise des connexions authentiques dans une communauté équilibrée et respectueuse."
    />
    <meta name="twitter:image" content="https://noumatch.com/main_img.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#ff4d6d" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
